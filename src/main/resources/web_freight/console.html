<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>minifreight · logistics</title>
<script src="https://auth.b4rruf3t.com/eco-nav.js" defer></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --line:#21262d; --text:#e6edf3; --dim:#8b949e;
    --green:#3fb950; --red:#f85149; --amber:#d29922; --accent:#58a6ff; --violet:#bc8cff;
  }
  *{box-sizing:border-box; margin:0}
  body{background:var(--bg); color:var(--text); font:14px/1.5 system-ui,'Segoe UI',sans-serif}
  ::-webkit-scrollbar{width:8px; height:8px}
  ::-webkit-scrollbar-thumb{background:#2a3140; border-radius:999px}
  ::-webkit-scrollbar-track{background:transparent}

  header{display:flex; align-items:center; gap:20px; padding:14px 22px; border-bottom:1px solid var(--line)}
  .brand{font-size:17px; font-weight:650}
  .brand span{color:var(--accent)}
  .tb-nav{margin-left:auto; display:flex; gap:8px}
  .pill{background:none; border:1px solid var(--line); color:var(--dim); padding:6px 16px;
        border-radius:999px; font:600 13px system-ui; cursor:pointer}
  .pill.active{background:var(--accent); border-color:var(--accent); color:#fff}

  main{max-width:980px; margin:0 auto; padding:22px; display:grid; gap:16px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px}
  .card h2{font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:12px}
  .row{display:flex; flex-wrap:wrap; gap:24px}
  .stat b{display:block; font-size:22px; font-weight:650}
  .stat i{font-style:normal; font-size:12px; color:var(--dim)}
  .prov{font-size:10px; letter-spacing:.06em; color:var(--dim); border:1px solid var(--line);
        border-radius:999px; padding:1px 8px; vertical-align:2px}

  .lookup{display:flex; gap:8px}
  .lookup input{flex:1; background:var(--bg); border:1px solid var(--line); border-radius:8px;
        color:var(--text); padding:8px 12px; font:13px ui-monospace,monospace}
  .lookup button{background:linear-gradient(135deg,var(--accent),var(--violet)); border:0; color:#fff;
        padding:8px 18px; border-radius:8px; font:600 13px system-ui; cursor:pointer}

  .state{font:600 12px system-ui; border-radius:999px; padding:2px 10px}
  .s-requested{color:var(--amber); border:1px solid var(--amber)}
  .s-labelled,.s-in_transit{color:var(--accent); border:1px solid var(--accent)}
  .s-delivered{color:var(--green); border:1px solid var(--green)}
  .s-failed,.s-stuck{color:var(--red); border:1px solid var(--red)}
  table{width:100%; border-collapse:collapse; font-size:13px}
  th{color:var(--dim); text-align:left; font-weight:600; padding:6px 8px; border-bottom:1px solid var(--line)}
  td{padding:6px 8px; border-bottom:1px solid var(--line); font-family:ui-monospace,monospace; font-size:12px}
  .err{color:var(--red)}
  .hint{color:var(--dim); font-size:12px}
</style>
</head>
<body>
<header>
  <div class="brand">mini<span>freight</span></div>
  <nav class="tb-nav">
    <button class="pill active">Shipments</button>
    <a class="pill" href="/api/freight/audit">Audit JSON</a>
  </nav>
</header>

<main>
  <section class="card">
    <h2>The floor, right now <span class="prov">MEASURED</span></h2>
    <div class="row" id="stats"><span class="hint">loading…</span></div>
    <p class="hint" style="margin-top:10px">
      Every number is read off freight's own books, which learned everything they know from the order
      topic and the carriers. Nothing here can see the shop's tables, and that is the point.
    </p>
  </section>

  <section class="card">
    <h2>Where is my parcel</h2>
    <div class="lookup">
      <input id="order" placeholder="order id (uuid)" spellcheck="false">
      <button onclick="track()">Track</button>
    </div>
    <div id="result" style="margin-top:14px"></div>
  </section>
</main>

<script>
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  async function stats() {
    const el = document.getElementById('stats');
    try {
      const a = await (await fetch('/api/freight/audit')).json();
      const states = Object.entries(a.states || {}).map(([k, v]) =>
        `<div class="stat"><b>${esc(v)}</b><i><span class="state s-${esc(k)}">${esc(k)}</span></i></div>`).join('');
      el.innerHTML = (states || '<span class="hint">no shipments yet</span>') +
        `<div class="stat"><b>${esc(a.oldest_open_seconds)}s</b><i>oldest open</i></div>` +
        `<div class="stat"><b>${esc(a.steps_with_unknown_outcome)}</b><i>unknown at a carrier</i></div>` +
        `<div class="stat"><b>${esc(a.consumer_unactionable)}</b><i>events skipped, counted</i></div>`;
    } catch (e) { el.innerHTML = '<span class="err">freight is not answering</span>'; }
  }

  async function track() {
    const el = document.getElementById('result');
    const id = document.getElementById('order').value.trim();
    if (!id) { el.innerHTML = '<span class="hint">paste an order id from the shop</span>'; return; }
    try {
      const r = await fetch('/api/shipments?order=' + encodeURIComponent(id));
      const s = await r.json();
      if (!r.ok || s.error) { el.innerHTML = `<span class="err">${esc(s.error || r.status)}</span>`; return; }
      el.innerHTML = `
        <p style="margin-bottom:10px">
          <span class="state s-${esc(s.state)}">${esc(s.state)}</span>
          &nbsp;${esc(s.qty)} × ${esc(s.variant)} → ${esc(s.destination)}
          ${s.carrier ? `&nbsp;· ${esc(s.carrier)} / ${esc(s.tracking)}` : ''}
        </p>
        <table>
          <tr><th>who</th><th>said</th><th>detail</th></tr>
          ${(s.steps || []).map(x => `<tr><td>${esc(x.carrier)}</td><td>${esc(x.state)}</td><td>${esc(x.detail)}</td></tr>`).join('')}
          ${(s.tracking_events || []).map(x => `<tr><td>${esc(x.carrier)}</td><td>${esc(x.status)}</td><td>${esc(x.eventKey)}</td></tr>`).join('')}
        </table>`;
    } catch (e) { el.innerHTML = '<span class="err">freight is not answering</span>'; }
  }

  stats();
  setInterval(stats, 5000);
</script>
</body>
</html>
