<!-- b4rruf3t ecosystem navigation — include in every app -->
<!-- Usage: <script src="https://auth.b4rruf3t.com/eco-nav.js"></script> -->
<!-- Or copy this file into your app's static resources -->

<style>
#eco-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(13,17,23,.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid #21262d; padding: 8px 20px;
  display: flex; align-items: center; gap: 4px;
  font: 13px/1.5 system-ui, 'Segoe UI', sans-serif;
}
#eco-nav .eco-tab {
  color: #8b949e; text-decoration: none; padding: 5px 14px;
  border-radius: 999px; transition: all .2s;
}
#eco-nav .eco-tab:hover { color: #e6edf3; background: #21262d; }
#eco-nav .eco-tab.active { color: #58a6ff; background: rgba(88,166,255,.1); }
#eco-nav .eco-user {
  margin-left: auto; color: #8b949e; font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
#eco-nav .eco-user a { color: #58a6ff; text-decoration: none; }
#eco-nav .eco-user a:hover { text-decoration: underline; }
#eco-nav .eco-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: #58a6ff; color: #fff; display: flex;
  align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
}
/* Push page content down to clear the fixed nav */
body { padding-top: 44px !important; }
</style>

<nav id="eco-nav">
  <span style="color:#e6edf3;font-weight:650;margin-right:12px;">b4rruf3t</span>
  <a class="eco-tab" href="https://bank.b4rruf3t.com" data-eco="bank">Bank</a>
  <a class="eco-tab" href="https://mart.b4rruf3t.com" data-eco="mart">Shop</a>
  <a class="eco-tab" href="https://desk.b4rruf3t.com" data-eco="desk">Trade</a>
  <a class="eco-tab" href="https://pay.b4rruf3t.com" data-eco="pay">Pay</a>
  <a class="eco-tab" href="https://gex.b4rruf3t.com" data-eco="gex">Data</a>
  <a class="eco-tab" href="https://obs.b4rruf3t.com" data-eco="obs">Agents</a>
  <div class="eco-user" id="eco-user-widget"></div>
</nav>

<script>
(function() {
  const TOKEN_KEY = 'b4rruf3t_token';
  const REFRESH_KEY = 'b4rruf3t_refresh';
  const API = 'https://auth.b4rruf3t.com';

  // Mark current app as active
  const host = location.hostname;
  document.querySelectorAll('.eco-tab').forEach(a => {
    if (a.href.includes(host)) a.classList.add('active');
  });

  // Check auth state
  const token = localStorage.getItem(TOKEN_KEY);
  const widget = document.getElementById('eco-user-widget');

  if (!token) {
    widget.innerHTML = '<a href="https://auth.b4rruf3t.com/login?next=' + encodeURIComponent(location.href) + '">Sign in</a>';
    return;
  }

  // Validate token and show user
  fetch(API + '/v1/users/me', {
    headers: { 'Authorization': 'Bearer ' + token }
  }).then(r => {
    if (r.status === 401) {
      // Token expired — try refresh
      return refreshToken().then(ok => {
        if (ok) return fetch(API + '/v1/users/me', {
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem(TOKEN_KEY) }
        });
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(REFRESH_KEY);
        widget.innerHTML = '<a href="https://auth.b4rruf3t.com/login?next=' + encodeURIComponent(location.href) + '">Sign in</a>';
        throw new Error('session expired');
      });
    }
    return r;
  }).then(r => r.json()).then(user => {
    const initial = (user.name || user.email || '?')[0].toUpperCase();
    widget.innerHTML =
      '<span class="eco-avatar">' + initial + '</span>' +
      '<span>' + (user.name || user.email) + '</span>' +
      '<a href="#" onclick="ecoLogout();return false" style="margin-left:8px">Sign out</a>';
  }).catch(() => {
    widget.innerHTML = '<a href="https://auth.b4rruf3t.com/login?next=' + encodeURIComponent(location.href) + '">Sign in</a>';
  });

  async function refreshToken() {
    const refresh = localStorage.getItem(REFRESH_KEY);
    if (!refresh) return false;
    try {
      const r = await fetch(API + '/v1/tokens/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refresh })
      });
      if (!r.ok) return false;
      const data = await r.json();
      localStorage.setItem(TOKEN_KEY, data.access_token);
      localStorage.setItem(REFRESH_KEY, data.refresh_token);
      return true;
    } catch { return false; }
  }

  window.ecoLogout = function() {
    const refresh = localStorage.getItem(REFRESH_KEY);
    if (refresh) {
      fetch(API + '/v1/tokens/revoke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refresh })
      });
    }
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(REFRESH_KEY);
    location.reload();
  };
})();
</script>
