# minimart's own infrastructure. Ports are deliberately offset from minibank's
# (5433/5434/5435, 9092, 6379) so both projects can run side by side.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minimart
      POSTGRES_PASSWORD: minimart
      POSTGRES_DB: minimart
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minimart"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - minimart-pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    ports:
      - "6380:6379"

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

volumes:
  minimart-pg:
